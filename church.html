<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pentecost Missions Fundraiser</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        :root {
            --pentecost-red: #b30000;
            --gold: #d4af37;
            --white: #ffffff;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border-top: 8px solid var(--pentecost-red);
        }

        /* LOGO STYLING */
        .church-logo {
            width: 100px;
            height: auto;
            margin-bottom: 15px;
        }

        h2 { color: var(--pentecost-red); margin: 10px 0; }
        p { color: #666; font-style: italic; margin-bottom: 20px; }

        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .momo-badge {
            background: #ffde00; /* MoMo Yellow */
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
            font-size: 0.8rem;
        }

        .btn-pay {
            background: var(--pentecost-red);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-pay:hover { background: #8e0000; }
    </style>
</head>
<body>

<div class="card">
    <img src="pentecost.jpg" alt="Church of Pentecost" class="church-logo">
    
    <h2>Missions Giving</h2>
    <p>"Possessing the Nations"</p>

    <div class="momo-badge">MTN / Telecel / AT Money Supported</div>

    <form id="paymentForm">
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your name" required>
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="email@example.com" required>
        </div>

        <div class="input-group">
            <label>Amount (GHS)</label>
            <input type="number" id="amount" placeholder="0.00" required>
        </div>

        <button type="submit" class="btn-pay" onclick="payWithPaystack(event)">Give Now</button>
    </form>
</div>

<script>
  function payWithPaystack(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const amount = document.getElementById("amount").value;

    if(!email || !amount) {
        alert("Please provide email and amount");
        return;
    }

    let handler = PaystackPop.setup({
      key: 'pk_live_xxxxxxxxxxxxxxxxxxxxxx', // PASTE YOUR PAYSTACK PUBLIC KEY HERE
      email: email,
      amount: amount * 100, // Converts GHS to Pesewas
      currency: 'GHS',
      ref: 'COP_Missions_'+Math.floor((Math.random() * 1000000) + 1),
      callback: function(response){
        alert('Payment Successful! Reference: ' + response.reference);
      }
    });

    handler.openIframe();
  }
</script>

</body>
</html>
